    <!-- Structured data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is PokeCounter?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "PokeCounter is a free Pokémon Champions counter tool. Enter the opposing team and PokeCounter tells you which Pokémon from your own team to bring, ranked by type coverage against the opponents."
            }
          },
          {
            "@type": "Question",
            "name": "How does the Pokémon Champions counter picker work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "PokeCounter scores each Pokémon in your team against the opponent using the complete 18-type effectiveness chart. It finds the optimal subset of 3 (for 1v1 singles) or 4 (for 2v2 doubles) that covers the most opponents super-effectively while avoiding mutual threats."
            }
          },
          {
            "@type": "Question",
            "name": "Does it support 1v1 and 2v2 battles?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Pokémon Champions uses 1v1 (pick 3 from your 6) and 2v2 (pick 4 from your 6) battle formats. PokeCounter supports both via a format toggle and recomputes the optimal subset instantly."
            }
          },
          {
            "@type": "Question",
            "name": "Is PokeCounter free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. PokeCounter is 100% free, runs entirely in your browser, has no ads, no login, and only uses privacy-friendly self-hosted analytics. Your team is auto-saved locally in your browser."
            }
          },
          {
            "@type": "Question",
            "name": "Does PokeCounter include a damage calculator?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The advanced team builder includes a Gen 9 damage calculator. Configure each Pokémon's ability, moves, item, nature and Stat Points, then see damage ranges and KO brackets against any target."
            }
          },
          {
            "@type": "Question",
            "name": "How many Pokémon are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "PokeCounter covers the full Pokémon Champions Season 1 roster — about 250 entries including all base forms and Mega Evolutions. Each entry ships with stats, abilities and a curated movepool, searchable in 9 languages (English, Français, Español, Deutsch, Italiano, 日本語, 한국어, 简体中文, 繁體中文)."
            }
          },
          {
            "@type": "Question",
            "name": "What's the battle simulator?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The battle simulator runs your team against up to 100 opposing teams across 10 archetypes (sun, rain, trick room, tailwind, hyper offense, bulky, mono-type, meta templates, etc.) and returns an estimated win rate per matchup plus insights on your weak points."
            }
          },
          {
            "@type": "Question",
            "name": "Can I import a Pokémon Showdown team?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The advanced team builder has Import/Export buttons that accept and produce standard Pokémon Showdown paste format, compatible with PokePaste and other VGC tools."
            }
          }
        ]
      }

        <h1>PokeCounter — Pokémon Champions Counter &amp; Type Coverage</h1>
        <p>
          <strong>PokeCounter</strong> is a free, open counter-picking tool for
          <strong>Pokémon Champions</strong>, the Pokémon Company's 2026
          competitive battler. Enter the opposing team and PokeCounter tells
          you which of your own six Pokémon to bring, in either
          <strong>1v1 (bring 3)</strong> or <strong>2v2 (bring 4)</strong> format,
          using the complete 18-type effectiveness chart.
        </p>
        <h2>Features</h2>
        <ul>
          <li>Full Pokémon Champions Season 1 Pokédex (≈250 entries, including Mega Evolutions)</li>
          <li>Interactive 18 × 18 type matchup chart</li>
          <li>Gen 9 damage calculator with Stat Point system</li>
          <li>Advanced team builder with moves, abilities, items, natures, Tera Type</li>
          <li>Team analyzer with overall score, shared weaknesses and offensive coverage holes</li>
          <li>Battle simulator vs 10 team archetypes (sun, rain, trick room, tailwind, hyper offense, bulky, mono, meta…)</li>
          <li>Compare two Pokémon builds side by side</li>
          <li>Import / export Pokémon Showdown pastes</li>
          <li>Available in English, Français, Español, Deutsch, Italiano, 日本語, 한국어, 简体中文 and 繁體中文</li>
        </ul>
        <h2>100 % free, privacy-friendly</h2>
        <p>
          No sign-up, no paywalls, no ads. Your team is auto-saved locally in
          your browser. Only privacy-friendly self-hosted analytics.
          Source code is on <a href="https://github.com/EricTron-FR/PokeCounter.app">GitHub</a>.
        </p>
        <p><a href="https://pokecounter.app/">Enable JavaScript to use the app.</a></p>
